# FinSecure API — Application Properties
# VULN: Debug config left enabled — exposes /actuator endpoints and H2 console

server.port=8080

# ─── H2 In-Memory Database ───────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:finsecuredb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# VULN: H2 console enabled and accessible from browser (no IP restriction)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.finsecure=DEBUG
# VULN: SQL queries logged in full — useful for attacker if logs are exposed
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# ─── Actuator (health + info exposed publicly) ───────────────────────────────
management.endpoints.web.exposure.include=health,info,env,beans
management.endpoint.health.show-details=always
# VULN: 'env' and 'beans' endpoints expose internal config + class structure

# ─── Error handling ──────────────────────────────────────────────────────────
# VULN: Full error details always returned (pairs with GlobalExceptionHandler)
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-exception=true

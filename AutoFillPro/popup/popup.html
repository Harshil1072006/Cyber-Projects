<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoFill Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- ── Header ─────────────────────────────────────── -->
  <header class="header">
    <div class="header-left">
      <div class="logo-icon">⚡</div>
      <div>
        <div class="logo-title">AutoFill Pro</div>
        <div class="logo-sub">Smart Form Filler</div>
      </div>
    </div>
    <button class="icon-btn" id="btn-settings" title="Open Settings">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- ── Active Profile Card ────────────────────────── -->
  <section class="profile-card" id="active-profile-card">
    <div class="profile-card-top">
      <div class="profile-avatar" id="popup-profile-icon">👤</div>
      <div class="profile-info">
        <div class="profile-name" id="popup-profile-name">Loading…</div>
        <div class="profile-email" id="popup-profile-email">—</div>
      </div>
      <div class="profile-badge" id="popup-fill-badge">0 fields</div>
    </div>
    <div class="profile-meta" id="popup-profile-meta"></div>
  </section>

  <!-- ── Fill Button ────────────────────────────────── -->
  <div class="fill-section">
    <button class="fill-btn" id="btn-fill">
      <span class="fill-btn-icon">⚡</span>
      <span class="fill-btn-text">Fill This Page</span>
      <span class="fill-btn-count" id="fill-result-count"></span>
    </button>
    <div class="fill-status" id="fill-status"></div>
  </div>

  <!-- ── Profile Switcher ───────────────────────────── -->
  <section class="section">
    <div class="section-header">
      <span class="section-title">Profiles</span>
      <button class="link-btn" id="btn-manage">Manage →</button>
    </div>
    <div class="profiles-list" id="profiles-list">
      <!-- injected by JS -->
    </div>
  </section>

  <!-- ── Quick Toggle ───────────────────────────────── -->
  <section class="section settings-row">
    <span class="toggle-label">Auto-fill on page load</span>
    <label class="toggle" id="toggle-autofill-wrap">
      <input type="checkbox" id="toggle-autofill" />
      <span class="toggle-slider"></span>
    </label>
  </section>

  <!-- ── Footer ─────────────────────────────────────── -->
  <footer class="footer">
    <button class="footer-btn" id="btn-open-options">⚙ Full Settings</button>
    <span class="footer-ver">v1.0.0</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>

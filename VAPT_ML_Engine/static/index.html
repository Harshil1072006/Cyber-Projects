<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulneraSense ML | AI Security Engine</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface: #141b2d;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --danger: #ef4444;
            --safe: #22c55e;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        textarea {
            width: 100%;
            height: 300px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            color: #a7f3d0;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            resize: vertical;
            outline: none;
            margin-bottom: 20px;
            transition: all 0.2s;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: var(--primary-hover);
        }
        
        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }

        .result-box {
            margin-top: 30px;
            padding: 24px;
            border-radius: 12px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            display: none;
            text-align: center;
        }

        .result-score {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 10px 0;
        }

        .score-safe { color: var(--safe); }
        .score-danger { color: var(--danger); text-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .spinner-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>VulneraSense Neural Engine</h1>
        <p class="text-muted">Drop C/C++ or Python code below to predict security flaws via Deep Learning.</p>
    </div>

    <div class="container">
        <textarea id="code-input" placeholder="// Paste your source code here to check for vulnerabilities...
#include <stdio.h>

int main() {
    char buf[10];
    gets(buf); // <--- Highly vulnerable
    return 0;
}"></textarea>
        
        <div class="controls">
            <span id="model-status" class="text-muted">Checking Engine Status...</span>
            <button id="scan-btn" onclick="runPrediction()">
                <div class="spinner-wrapper">
                    <span>Scan Architecture</span>
                    <div class="loader" id="loader"></div>
                </div>
            </button>
        </div>

        <div class="result-box" id="result-box">
            <p class="text-muted" style="text-transform: uppercase; font-weight: 700; letter-spacing: 2px;">Threat Probability</p>
            <div class="result-score" id="score-display">0%</div>
            <p id="result-message" style="font-size: 1.1rem; color: #cbd5e1;">Awaiting code submission.</p>
        </div>
    </div>

    <script>
        // Check Model Status on load
        fetch('/api/status')
            .then(res => res.json())
            .then(data => {
                const statusEl = document.getElementById('model-status');
                if(data.model_status === "Active") {
                    statusEl.innerHTML = "🟢 Model Online & Loaded";
                    statusEl.style.color = "var(--safe)";
                } else {
                    statusEl.innerHTML = "🟡 Model Not Trained Yet (Run train.py)";
                    statusEl.style.color = "#fbbf24";
                }
            })
            .catch(() => {
                document.getElementById('model-status').innerText = "🔴 API Offline";
            });

        async function runPrediction() {
            const code = document.getElementById('code-input').value;
            if(!code.trim()) return alert("Please enter some source code.");

            const btn = document.getElementById('scan-btn');
            const loader = document.getElementById('loader');
            const resBox = document.getElementById('result-box');
            const scoreDisp = document.getElementById('score-display');
            const resMsg = document.getElementById('result-message');

            btn.disabled = true;
            loader.style.display = 'block';
            resBox.style.display = 'none';

            try {
                const response = await fetch('/api/predict/snippet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });

                const data = await response.json();
                
                if(!response.ok) {
                    alert(data.detail || "Prediction failed.");
                    throw new Error("Failed");
                }

                resBox.style.display = 'block';
                scoreDisp.innerText = data.vulnerability_probability + '%';

                if(data.is_vulnerable) {
                    scoreDisp.className = 'result-score score-danger';
                    resMsg.innerText = '🚨 Critical AI Warning: High likelihood of vulnerabilities existing in this snippet.';
                } else {
                    scoreDisp.className = 'result-score score-safe';
                    resMsg.innerText = '✅ Code structural integrity appears reasonably safe to the AI.';
                }

            } catch (err) {
                console.error(err);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>

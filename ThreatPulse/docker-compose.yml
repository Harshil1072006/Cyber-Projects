version: "3.8"

services:
  # ─── Database ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: tip_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tip_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tip_password}
      POSTGRES_DB: ${POSTGRES_DB:-threat_intel}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tip_user -d threat_intel"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Message Queue / Cache ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tip_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── SIEM (Elasticsearch) ──────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.0
    container_name: tip_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Dashboard (Grafana) ───────────────────────────────
  grafana:
    image: grafana/grafana:10.2.3
    container_name: tip_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-worldmap-panel,grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - postgres

  # ─── Pipeline App (manual / one-shot run) ─────────────
  pipeline-app:
    build: .
    container_name: tip_pipeline
    restart: "no"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://tip_user:tip_password@postgres:5432/threat_intel
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "src.tasks.manual_run"]

  # ─── Celery Worker ─────────────────────────────────────
  celery-worker:
    build: .
    container_name: tip_celery_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://tip_user:tip_password@postgres:5432/threat_intel
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "src.tasks.celery_app", "worker", "--loglevel=info", "--concurrency=2"]

  # ─── Celery Beat (scheduler) ───────────────────────────
  celery-beat:
    build: .
    container_name: tip_celery_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://tip_user:tip_password@postgres:5432/threat_intel
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "src.tasks.celery_app", "beat", "--loglevel=info"]

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  grafana_data:
